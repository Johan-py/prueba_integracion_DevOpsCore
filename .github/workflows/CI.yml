name: CI Monorepo

on:
  push:
    branches: [develop, main, feature/**]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Lint general
        run: pnpm run lint

  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Instalar deps
        run: pnpm install --frozen-lockfile

      - name: Generar Prisma Client
        run: pnpm --filter backend exec prisma generate

      - name: Type check backend
        run: pnpm --filter backend exec tsc --noEmit

      - name: Type check frontend
        run: pnpm --filter frontend exec tsc --noEmit

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Instalar deps
        run: pnpm install --frozen-lockfile

      - name: Generar Prisma Client
        run: pnpm --filter backend exec prisma generate

      - name: Build backend
        run: pnpm --filter backend run build

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Instalar deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend run build