name: API Integration Tests

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/testdb"
      JWT_SECRET: "ci_test_secret_key"
      PORT: 5000
      NODE_ENV: test
      FRONTEND_URL: "http://localhost:3000"

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Instalar dependencias del backend
        working-directory: backend
        run: pnpm install

      - name: Verificar schema.prisma (debug)
        working-directory: backend
        run: cat prisma/schema.prisma

      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: Crear tablas en DB de test
        working-directory: backend
        run: npx prisma db push --accept-data-loss

      - name: Instalar wait-on
        run: npm install -g wait-on

      - name: Iniciar backend en background
        working-directory: backend
        run: nohup pnpm dev > /tmp/backend.log 2>&1 &

      - name: Esperar a que el backend responda
        run: wait-on http://localhost:5000/health --timeout 60000

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias Python
        run: pip install -r tests_api/requirements.txt

      - name: Ejecutar tests de API
        run: pytest tests_api/ -v --tb=short

      - name: Mostrar log del backend si hubo error
        if: failure()
        run: cat /tmp/backend.log